template:
  name: simple-assistant
  description: Minimal single-agent assistant with Anthropic provider

config:
  mcp_servers:
    - name: playwright
      command: npx
      args: ["-y", "@anthropic-ai/mcp-playwright"]

  providers:
    - name: default
      kind: anthropic
      api_key: ${ANTHROPIC_API_KEY}
      model: claude-sonnet-4-20250514

  agents:
    - name: assistant
      description: A helpful assistant
      instructions: >-
        You are a helpful assistant. Be concise and accurate. You have access to
        Playwright browser tools — use them to browse the internet for up-to-date
        research, documentation lookups, and verifying information when needed.
      provider: default
      toolboxes:
        - filesystem
        - exec
        - search
        - git
        - playwright
      skills:
        - project-indexer
      effects:
        - kind: observation_mask
          params:
            threshold: 0.5
            recent_window: 8
        - kind: trim_tool_results
          params:
            max_result_length: 400
            preserve_recent: 3
        - kind: compact
          params:
            threshold: 0.75
        - kind: stall_detect
        - kind: time_budget
          params:
            max_duration: "5m"
      options:
        max_iterations: 10
        max_delegation_depth: 2

  entry_agent: assistant

embedded_skills:
  - name: project-indexer
