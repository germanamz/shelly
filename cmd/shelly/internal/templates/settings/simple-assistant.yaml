template:
  name: simple-assistant
  description: Minimal single-agent assistant with Anthropic provider

config:
  providers:
    - name: default
      kind: anthropic
      api_key: ${ANTHROPIC_API_KEY}
      model: claude-sonnet-4-20250514

  agents:
    - name: assistant
      description: A helpful assistant
      instructions: You are a helpful assistant. Be concise and accurate.
      provider: default
      toolboxes:
        - filesystem
        - exec
        - search
        - git
      skills:
        - project-indexer
      effects:
        - kind: observation_mask
          params:
            threshold: 0.5
            recent_window: 8
        - kind: trim_tool_results
          params:
            max_result_length: 400
            preserve_recent: 3
        - kind: compact
          params:
            threshold: 0.75
      options:
        max_iterations: 10
        max_delegation_depth: 2

  entry_agent: assistant

embedded_skills:
  - name: project-indexer
